<!-- Index.html -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asprients - Login</title>
<link rel="icon" href="images/logo1.png" type="image/png">
<link rel="stylesheet" href="CSS/index.css">

</head>
<body>

<div class="auth-container">
  <img src="images/logo.png" class="logo">
  <h1 class="brand">Asprients</h1>
<p class="tagline">Your Personal Study System</p>
  <div class="auth-tabs">
    <button id="loginTab" class="active">Login</button>
    <button id="signupTab">Sign Up</button>
  </div>

  <!-- Login -->
  <form id="loginForm" class="active">
    
    <div class="form-group">
  <input type="email" id="loginEmail" required placeholder=" ">
<label>Email</label>
</div>
    
    <div class="form-group">
  <input type="password" id="loginPassword" required placeholder=" ">
  <label>Password</label>
</div>

    <button class="submit-btn">Ready To Dominate</button>
    <div class="switch-link">
      <a id="forgotPassword">Forgot Password?</a>
    </div>
    <div class="switch-link">
      Don't have an account? <a id="toSignup">Sign Up</a>
    </div>
  </form>

  <!-- Signup -->
  <form id="signupForm">
     <div class="form-group">
  <input type="text" id="signupName" required placeholder=" ">
  <label>Full Name</label>
</div>

     <div class="form-group">
  <input type="email" id="signupEmail" required placeholder=" ">
  <label>Email</label>
</div>

     <div class="form-group">
  <input type="password" id="signupPassword" required placeholder=" ">
  <label>Password</label>
</div>
    
 <div class="form-group">
  <input type="password" id="signupConfirm" required placeholder=" ">
  <label>Confirm Password</label>
</div>
    <button class="submit-btn">Sign Up</button>
    <div class="switch-link">
      Already have an account? <a id="toLogin">Login</a>
    </div>
  </form>

  <div id="message" style="color:red; font-weight:bold;"></div>

<script type="module" src="JavaScript/index.js"></script>
<script type="module" src="JavaScript/auth-guard.js"></script>


</body>
</html>
